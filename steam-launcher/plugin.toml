id = "aalbayaty/steam-launcher"
name = "Steam Launcher"
version = "1.0.2"
plugin_api = 3
min_noctalia = "5.0.0"
author = "aalbayaty"
license = "MIT"
dependencies = []
tags = ["Launcher", "Gaming"]
icon = "device-gamepad-2"
description = "Browse and launch installed Steam games from the launcher."

[[launcher_provider]]
id = "steam"
entry = "provider.luau"
prefix = "steam"
glyph = "device-gamepad-2"
include_in_global_search = true
debounce_ms = 100

  # Provider-local category filter. Plugin providers can't inject into the
  # Applications launcher's built-in "Games" tab (that's derived from .desktop
  # Categories=), so we mirror it with a same-label/glyph filter shown while the
  # steam provider is active. Each result row carries category = "Games".
  [[launcher_provider.category]]
  label = "Games"
  glyph = "device-gamepad-2"

# Plugin-level settings (the shell rejects entry-level [[launcher_provider.setting]]
# even though validate-plugins.py accepts it — launcher_provider settings must be
# top-level [[setting]], as in the official translator/kaomoji plugins).
[[setting]]
key = "steamappsDir"
type = "string"
label_key = "settings.steamappsDir.label"
description_key = "settings.steamappsDir.description"
default = "~/.steam/steam/steamapps"

[[setting]]
key = "librarycacheDir"
type = "string"
label_key = "settings.librarycacheDir.label"
description_key = "settings.librarycacheDir.description"
default = "~/.steam/steam/appcache/librarycache"
